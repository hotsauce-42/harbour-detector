data:
  raw_glob: "data/raw/**/*.parquet"
  interim_dir: "data/interim"
  reference_dir: "data/reference"
  output_dir: "data/output"

# Column name mapping — adjust to match your actual Parquet schema
columns:
  mmsi: mmsi
  timestamp: timestamp
  lat: lat
  lon: lon
  sog: sog
  nav_status: nav_status
  msg_type: msg_type
  draught: draught
  destination: destination
  ship_type: ship_type

phase1:
  # Strategy A: nav_status filter
  moored_nav_statuses: [1, 5]       # 1=at anchor, 5=moored

  # Both strategies: low-speed threshold
  sog_threshold_knots: 0.5

  # Stop segment grouping
  max_gap_minutes: 15               # gap between messages that still belongs to same stop
  min_stop_duration_minutes: 30     # discard stops shorter than this
  min_messages_per_stop: 3          # discard stops with too few messages
  positional_variance_max_meters: 300  # discard stops where ship was still moving around

  # MMSI validity filter
  mmsi_min: 100000000
  mmsi_max: 999999999

  # Draught join: how far before/after a stop to look for type 5 messages
  draught_lookup_hours: 6

phase2:
  h3_resolution: 11
  min_unique_mmsi: 5               # minimum unique vessels to consider a cell a harbour

phase3:
  # connected component thresholds (tuned in later phase)
  min_cells_per_harbour: 1
  # How many H3 rings to look outward when connecting hot cells.
  # 1 = touching only; 3 bridges small cold-cell gaps within a harbour complex.
  cluster_ring_size: 3

phase4:
  city_min_population: 1000        # minimum population for "nearest city" lookup

phase5:
  # ID matching thresholds
  h3_jaccard_threshold: 0.3        # minimum H3 cell overlap to match existing harbour
  centroid_match_distance_meters: 500

spark:
  app_name: "harbour-detector"
  # All other Spark/executor settings live in deploy/spark_job.yaml (sparkConf,
  # driver/executor resources). Only app_name is needed here.

s3:
  # Leave blank to use environment variables or IAM instance roles.
  # Values here take precedence over environment variables.
  # Corresponding env vars: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
  #                         AWS_DEFAULT_REGION, S3_ENDPOINT_URL
  # For local credentials, copy .env.example → .env and fill it in.
  access_key_id:     ""
  secret_access_key: ""
  region:            ""   # defaults to us-east-1 when blank
  endpoint_url:      ""   # set for MinIO, e.g. http://localhost:9000

  # To route the pipeline through S3, change data.raw_glob / interim_dir /
  # output_dir to S3 URIs, e.g.:
  #   raw_glob:    "s3://my-bucket/ais/**/*.parquet"
  #   interim_dir: "s3://my-bucket/harbour-detector/interim"
  #   output_dir:  "s3://my-bucket/harbour-detector/output"

gui:
  output_file: "data/output/harbours.geojson"
  default_tile: "OpenStreetMap"
  map_tiles:
    - name: "OpenStreetMap"
      url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
      attribution: "© <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> contributors"
    - name: "CartoDB Positron"
      url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
      attribution: "© <a href='https://carto.com/'>CARTO</a>"
    - name: "CartoDB Dark"
      url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
      attribution: "© <a href='https://carto.com/'>CARTO</a>"
    - name: "Esri Satellite"
      url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
      attribution: "© Esri, Maxar, Earthstar Geographics"
    # Add custom tile servers here, e.g.:
    # - name: "My Server"
    #   url: "https://mytiles.example.com/{z}/{x}/{y}.png"
    #   attribution: "© My Company"
