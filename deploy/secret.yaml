# Kubernetes Secret holding S3 credentials.
#
# Fill in the real values, then apply with:
#   kubectl apply -f deploy/secret.yaml
#
# For MinIO add a fourth key:
#   endpoint-url: "http://minio.minio-ns.svc.cluster.local:9000"
# and reference it in job.yaml as S3_ENDPOINT_URL.
#
# WARNING: Do NOT commit this file with real credentials.
# Use a secrets manager (Vault, AWS Secrets Manager, Sealed Secrets, …)
# and generate this file at deploy time.
apiVersion: v1
kind: Secret
metadata:
  name: harbour-detector-s3
type: Opaque
stringData:
  access-key-id:     "CHANGE_ME"
  secret-access-key: "CHANGE_ME"
  region:            "eu-west-1"
  # endpoint-url:    "http://minio.minio-ns.svc.cluster.local:9000"
