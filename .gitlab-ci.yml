stages:
  - lint
  - test

default:
  image: python:3.12-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ── Lint ──────────────────────────────────────────────────────────────────────

lint:
  stage: lint
  cache:
    key: pip-lint
    paths:
      - .cache/pip
  script:
    - pip install ruff
    - ruff check .

# ── Test ──────────────────────────────────────────────────────────────────────

test:
  stage: test
  cache:
    key: pip-test
    paths:
      - .cache/pip
  before_script:
    - apt-get update -qq && apt-get install -y --no-install-recommends libgdal-dev
    - pip install -r requirements.txt
  script:
    - pytest
